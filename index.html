<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:linear-gradient(180deg,#050816,#0f1c35);
color:#fff;
}

.nav{
position:sticky;
top:0;
padding:16px 24px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.08);
}

.hero{
padding:100px 20px;
text-align:center;
}

.hero h1{
font-size:56px;
margin-bottom:15px;
}

.hero p{
color:#b8c2d6;
font-size:20px;
}

.btn{
margin-top:25px;
padding:14px 28px;
border:none;
border-radius:999px;
background:#0a84ff;
color:white;
font-size:16px;
cursor:pointer;
}

#qqBox{
display:none;
max-width:500px;
margin:25px auto;
padding:20px;
background:rgba(255,255,255,.08);
border-radius:20px;
}

.section{
max-width:1100px;
margin:auto;
padding:60px 20px;
}

.title{
text-align:center;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,.06);
padding:24px;
border-radius:24px;
backdrop-filter:blur(12px);
}

.footer{
padding:40px 20px;
text-align:center;
color:#aaa;
}
</style>
</head>

<body>

<div class="nav">
🚀 Lumina
</div>

<section class="hero">

<h1>Lumina</h1>

<p>
高速 · 稳定 · 安全
</p>

<button class="btn" onclick="toggleQQ()">
联系客服
</button>

<div id="qqBox">
<p>客服QQ：730733379</p>
<br>
<p>代理合作QQ：1815500285</p>
<br>
<p>长按或复制QQ号添加好友</p>
</div>

</section>

<section class="section">

<h2 class="title">🌍 节点地区</h2>

<div class="grid">

<div class="card">🇺🇸 美国</div>
<div class="card">🇯🇵 日本</div>
<div class="card">🇭🇰 香港</div>
<div class="card">🇸🇬 新加坡</div>
<div class="card">🇦🇺 澳大利亚</div>
<div class="card">🇮🇳 印度</div>

</div>

</section>

<section class="section">

<h2 class="title">📱 平台支持</h2>

<div class="grid">

<div class="card">iOS</div>
<div class="card">Android</div>
<div class="card">Windows</div>
<div class="card">macOS</div>

</div>

</section>

<section class="section">

<h2 class="title">ℹ️ 服务特点</h2>

<div class="grid">

<div class="card">多地区节点</div>
<div class="card">多平台支持</div>
<div class="card">稳定连接体验</div>

</div>

</section>

<section class="section">

<h2 class="title">声明</h2>

<div class="card">
本站内容仅用于品牌展示与信息介绍，请遵守当地法律法规使用相关服务。
</div>

</section>

<div class="footer">
© 2025 Lumina
</div>

<script>
function toggleQQ(){
const box=document.getElementById("qqBox");
box.style.display=
box.style.display==="block"
? "none"
: "block";
}
</script>

</body>
</html>

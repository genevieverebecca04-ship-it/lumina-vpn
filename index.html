<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lumina</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:-apple-system,
BlinkMacSystemFont,
"SF Pro Display",
sans-serif;

background:#050816;

color:white;

overflow-x:hidden;

}

/* 背景 */

.bg{

position:fixed;

width:100%;

height:100%;

z-index:-1;

background:

radial-gradient(circle at top left,
rgba(10,132,255,.25),
transparent 40%),

radial-gradient(circle at bottom right,
rgba(48,209,88,.15),
transparent 40%),

#050816;

}

/* 导航栏 */

.nav{

position:fixed;

top:20px;

left:50%;

transform:translateX(-50%);

width:92%;

max-width:1200px;

padding:15px 25px;

display:flex;

justify-content:space-between;

align-items:center;

background:rgba(255,255,255,.06);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

border-radius:20px;

z-index:999;

}

.logo{

font-size:24px;

font-weight:700;

}

.nav-right{

color:#999;

}

/* 首屏 */

.hero{

padding-top:180px;

padding-bottom:120px;

text-align:center;

}

.hero h1{

font-size:72px;

font-weight:700;

background:linear-gradient(
90deg,
#ffffff,
#7cc6ff,
#ffffff
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

margin-bottom:20px;

}

.hero p{

font-size:24px;

color:#9ca3af;

line-height:1.8;

}

.btn{

margin-top:40px;

padding:18px 40px;

border:none;

border-radius:999px;

background:#0a84ff;

color:white;

font-size:18px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

.btn:hover{

transform:translateY(-5px);

}

#qqBox{

display:none;

margin:35px auto 0;

max-width:450px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

padding:25px;

border-radius:24px;

}

/* 通用 */

.section{

max-width:1200px;

margin:auto;

padding:100px 20px;

}

.title{

font-size:52px;

text-align:center;

margin-bottom:60px;

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:25px;

}

.card{

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

border-radius:28px;

padding:30px;

transition:.3s;

}

.card:hover{

transform:translateY(-10px);

}

.card h3{

margin-bottom:15px;

font-size:24px;

}

.card p{

color:#9ca3af;

line-height:1.8;

}

/* 数据 */

.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:25px;

}

.stat{

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border-radius:28px;

padding:35px;

text-align:center;

}

.stat h2{

font-size:52px;

margin-bottom:10px;

}

.stat span{

color:#9ca3af;

}

@media(max-width:768px){

.hero h1{
font-size:52px;
}

.title{
font-size:36px;
}

}

</style>

</head>
